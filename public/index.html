<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIA Web Console</title>
  <style>
    /* ─── Reset & Base ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #1a1b1e;
      --bg-panel: #25262b;
      --bg-input: #2c2e33;
      --bg-bubble-user: #2563eb;
      --bg-bubble-mia: #2d3a2f;
      --border: #373a40;
      --text: #e0e0e0;
      --text-dim: #909296;
      --text-bright: #ffffff;
      --accent: #4cc9f0;
      --accent-green: #51cf66;
      --accent-orange: #f08c00;
      --accent-purple: #b197fc;
      --accent-red: #ff6b6b;
      --font-mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    /* ─── Layout ──────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-height: 100vh;
    }

    /* ─── Header ──────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    #header .logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    #header .logo span { color: var(--text-dim); font-weight: 400; }
    #header .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #header .header-btn {
      background: var(--bg-input);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    #header .header-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }
    #header .header-btn.active {
      color: var(--accent);
      border-color: var(--accent);
    }
    #status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }
    #status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-red);
      transition: background 0.3s;
    }
    #status .dot.connected { background: var(--accent-green); }

    /* ─── Main Content ────────────────────────── */
    #main {
      display: grid;
      grid-template-columns: 1fr 320px;
      overflow: hidden;
      min-height: 0;
    }
    /* 侧边面板隐藏时 chat 面板占满 */
    #main.side-hidden {
      grid-template-columns: 1fr 0;
    }
    #main.side-hidden #side-panel {
      display: none;
    }

    @media (max-width: 700px) {
      #main { grid-template-columns: 1fr; }
      #side-panel { display: none; }
    }

    /* ─── Chat Panel ──────────────────────────── */
    #chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar {
      width: 6px;
    }
    #chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    #chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ─── Chat Bubbles ────────────────────────── */
    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    
    .msg-row.user { align-self: flex-end; }
    .msg-row.mia { align-self: flex-start; }
    
    .msg-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 2px;
      padding: 0 6px;
    }
    .msg-row.user .msg-label { text-align: right; }
    
    .msg-bubble {
      padding: 8px 14px;
      border-radius: 12px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
      font-size: 13.5px;
    }
    .msg-row.user .msg-bubble {
      background: var(--bg-bubble-user);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.mia .msg-bubble {
      background: var(--bg-bubble-mia);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    
    /* Markdown-like formatting in bubbles */
    .msg-bubble code {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 12.5px;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,0.3);
      padding: 10px 14px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 6px 0;
      font-family: var(--font-mono);
      font-size: 12.5px;
      line-height: 1.4;
    }
    .msg-bubble pre code {
      background: none;
      padding: 0;
    }

    /* Streaming cursor */
    .streaming-cursor::after {
      content: '▊';
      animation: blink 1s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ─── Side Panel (Thoughts + Tools) ──────── */
    #side-panel {
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--bg-panel);
      overflow: hidden;
      min-height: 0;
    }
    
    .side-section {
      display: flex;
      flex-direction: column;
      min-height: 0;
      transition: flex 0.2s ease;
    }
    .side-section.thoughts { flex: 1; border-bottom: 1px solid var(--border); }
    .side-section.thoughts.collapsed { flex: 0 0 auto; }    /* 收起后只占 header 高度 */
    .side-section.tools { flex: 0 1 50%; }
    .side-section.tools.collapsed { flex: 0 0 auto; }       /* 收起后只占 header 高度 */
    .side-section.logs-section { flex: 0 1 30%; border-top: 1px solid var(--border); }
    .side-section.logs-section.collapsed { flex: 0 0 auto; }
    
    /* 当 Thinking 收起时，Tools 自动撑满剩余空间 */
    .side-section.thoughts.collapsed ~ .side-section.tools:not(.collapsed) { flex: 1; }
    
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
    }
    .section-header:hover { color: var(--text); }
    .section-header .toggle { font-size: 10px; transition: transform 0.2s; }
    
    /* 折叠状态 — 用 CSS class 控制，不用 JS inline style */
    .side-section.collapsed .section-body { display: none; }
    .side-section.collapsed .toggle { transform: rotate(-90deg); }
    
    .section-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }
    .section-body::-webkit-scrollbar {
      width: 4px;
    }
    .section-body::-webkit-scrollbar-track {
      background: transparent;
    }
    .section-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* Thought card */
    .thought-card {
      background: rgba(177, 151, 252, 0.08);
      border: 1px solid rgba(177, 151, 252, 0.2);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      animation: fadeIn 0.2s ease;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s;
    }
    .thought-card:hover {
      border-color: rgba(177, 151, 252, 0.4);
    }
    .thought-card .thought-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .thought-card .thought-agent {
      color: var(--accent-purple);
      font-weight: 600;
      font-size: 11px;
      white-space: nowrap;
    }
    .thought-card .thought-title {
      color: var(--text);
      font-weight: 500;
      font-size: 11.5px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .thought-card .thought-ts {
      color: var(--text-dim);
      font-size: 9px;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .thought-card .thought-expand {
      font-size: 9px;
      color: var(--text-dim);
      flex-shrink: 0;
      transition: transform 0.2s;
      line-height: 1;
    }
    .thought-card.expanded .thought-expand {
      transform: rotate(90deg);
    }
    .thought-card .thought-detail {
      color: var(--text-dim);
      font-size: 11.5px;
      line-height: 1.4;
      word-break: break-word;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: none;
    }
    .thought-card.expanded .thought-detail {
      display: block;
    }
    /* 无 detail 时不显示展开按钮 */
    .thought-card.no-detail { cursor: default; }
    .thought-card.no-detail .thought-expand { display: none; }
    .thought-card.no-detail:hover { border-color: rgba(177, 151, 252, 0.2); }

    /* Tool card */
    .tool-card {
      background: rgba(240, 140, 0, 0.06);
      border: 1px solid rgba(240, 140, 0, 0.15);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      animation: fadeIn 0.2s ease;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s;
    }
    .tool-card:hover {
      border-color: rgba(240, 140, 0, 0.3);
    }
    .tool-card.tool-running {
      border-color: rgba(76, 201, 240, 0.3);
      background: rgba(76, 201, 240, 0.05);
    }
    .tool-card.tool-running:hover { border-color: rgba(76, 201, 240, 0.5); }
    .tool-card.tool-success {
      border-color: rgba(81, 207, 102, 0.3);
      background: rgba(81, 207, 102, 0.05);
    }
    .tool-card.tool-success:hover { border-color: rgba(81, 207, 102, 0.5); }
    .tool-card.tool-error {
      border-color: rgba(255, 107, 107, 0.3);
      background: rgba(255, 107, 107, 0.05);
    }
    .tool-card.tool-error:hover { border-color: rgba(255, 107, 107, 0.5); }
    .tool-card .tool-name {
      font-weight: 600;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tool-card .tool-name-text { flex: 1; }
    .tool-card .tool-ts {
      color: var(--text-dim);
      font-size: 9px;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .tool-card .tool-status {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .tool-card.tool-running .tool-status { background: var(--accent); color: #000; }
    .tool-card.tool-success .tool-status { background: var(--accent-green); color: #000; }
    .tool-card.tool-error .tool-status { background: var(--accent-red); color: #fff; }
    .tool-card .tool-expand {
      font-size: 9px;
      color: var(--text-dim);
      flex-shrink: 0;
      transition: transform 0.2s;
      line-height: 1;
    }
    .tool-card.expanded .tool-expand {
      transform: rotate(90deg);
    }

    /* Tool body (args + result) — 默认隐藏，展开后显示 */
    .tool-card .tool-body {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: none;
    }
    .tool-card.expanded .tool-body {
      display: block;
    }
    .tool-card .tool-args,
    .tool-card .tool-result {
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.4;
      word-break: break-word;
    }
    .tool-card .tool-result { margin-top: 4px; }
    /* 无 body 时不显示展开按钮 */
    .tool-card.no-body { cursor: default; }
    .tool-card.no-body .tool-expand { display: none; }
    .tool-card.no-body:hover { border-color: inherit; }

    /* Empty state */
    .empty-hint {
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
      padding: 20px 0;
      opacity: 0.6;
    }

    /* ─── Log Panel ──────────────────────────── */
    .log-body {
      font-family: var(--font-mono);
      font-size: 10.5px;
      line-height: 1.35;
    }
    .log-entry {
      color: var(--text-dim);
      padding: 1px 0;
      white-space: pre-wrap;
      word-break: break-all;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      display: flex;
      gap: 6px;
    }
    .log-entry .log-ts {
      color: var(--text-dim);
      opacity: 0.4;
      flex-shrink: 0;
      font-size: 9px;
    }
    .log-entry .log-text {
      flex: 1;
    }

    /* ─── Input Bar ───────────────────────────── */
    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
    }
    #input-bar textarea {
      flex: 1;
      resize: none;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: var(--font-sans);
      font-size: 13.5px;
      line-height: 1.4;
      min-height: 40px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }
    #input-bar textarea:focus {
      border-color: var(--accent);
    }
    #input-bar textarea::placeholder {
      color: var(--text-dim);
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-send {
      background: var(--accent);
      color: #000;
    }
    .btn-send:hover { background: #7dd8f5; }
    .btn-send:disabled {
      background: var(--border);
      color: var(--text-dim);
      cursor: not-allowed;
    }
    .btn-stop {
      background: var(--accent-red);
      color: #fff;
    }
    .btn-stop:hover { background: #ff8787; }
    .btn-stop:disabled {
      background: var(--border);
      color: var(--text-dim);
      cursor: not-allowed;
    }

    /* ─── System messages ────────────────────── */
    .sys-msg {
      text-align: center;
      color: var(--text-dim);
      font-size: 11.5px;
      padding: 4px 0;
      opacity: 0.7;
    }

    /* ─── Memory Modal ───────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90vw;
      max-width: 800px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .modal-close:hover { color: var(--accent-red); }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }
    .modal-body::-webkit-scrollbar { width: 6px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .modal-stats {
      color: var(--text-dim);
      font-size: 12px;
      margin-bottom: 10px;
    }
    .modal-memory-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .modal-memory-item .mem-content {
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .modal-memory-item .mem-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 10.5px;
      color: var(--text-dim);
    }
    .modal-memory-item .mem-meta span {
      background: rgba(255,255,255,0.05);
      padding: 1px 6px;
      border-radius: 4px;
    }
    .mem-category { color: var(--accent-purple); }
    .mem-confidence { color: var(--accent-green); }
    .mem-keywords { color: var(--accent); }
    .modal-loading {
      text-align: center;
      color: var(--text-dim);
      padding: 30px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
      <div id="header">
        <div class="logo">⚡ MIA <span>Web Console v0.2.0</span></div>
        <div class="header-actions">
          <button class="header-btn active" id="btn-panel" onclick="toggleSidePanel()" title="显示/隐藏侧边面板">☰ 面板</button>
          <button class="header-btn" id="btn-memory" onclick="openMemoryModal()" title="查看所有记忆数据">🧠 记忆</button>
        </div>
        <div id="status">
          <div class="dot" id="status-dot"></div>
          <span id="status-text">Disconnected</span>
        </div>
      </div>

    <!-- Main Content -->
    <div id="main">
      <!-- Chat Panel (Left) -->
      <div id="chat-panel">
        <div id="chat-messages">
          <div class="sys-msg">Welcome to MIA Web Console — type a message and press Enter to start</div>
        </div>
      </div>

      <!-- Side Panel (Right) -->
      <div id="side-panel">
        <!-- Thoughts Section -->
        <div class="side-section thoughts">
          <div class="section-header" onclick="toggleSection(this)">
            💭 Thinking
            <span class="toggle">▼</span>
          </div>
          <div class="section-body" id="thoughts-body">
            <div class="empty-hint">Agent thinking will appear here</div>
          </div>
        </div>
        <!-- Tools Section -->
        <div class="side-section tools">
          <div class="section-header" onclick="toggleSection(this)">
            🔧 Tools
            <span class="toggle">▼</span>
          </div>
          <div class="section-body" id="tools-body">
            <div class="empty-hint">Tool executions will appear here</div>
          </div>
        </div>
        <!-- Logs Section -->
        <div class="side-section logs-section">
          <div class="section-header" onclick="toggleSection(this)">
            📋 Logs
            <span class="toggle">▼</span>
          </div>
          <div class="section-body log-body" id="logs-body">
            <div class="empty-hint">Backend logs will appear here</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Bar -->
    <div id="input-bar">
      <textarea
        id="user-input"
        placeholder="Type your message here... (Enter to send, Shift+Enter for newline)"
        rows="1"
      ></textarea>
      <button class="btn btn-send" id="btn-send" onclick="sendMessage()">Send</button>
      <button class="btn btn-stop" id="btn-stop" onclick="stopGeneration()" disabled>Stop</button>
    </div>
  </div>

  <!-- Memory Modal -->
  <div class="modal-overlay" id="memory-modal">
    <div class="modal-box">
      <div class="modal-header">
        <span>🧠 记忆数据</span>
        <button class="modal-close" onclick="closeMemoryModal()">✕</button>
      </div>
      <div class="modal-body" id="memory-modal-body">
        <div class="modal-loading">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    // ─── State ──────────────────────────────────────────
    let ws = null;
    let sessionId = null;
    /** Whether we're currently generating/streaming */
    let streaming = false;
    /** The current streaming MIA bubble element */
    let streamBubble = null;
    /** The current streaming message row */
    let streamRow = null;

    // ─── DOM Refs ───────────────────────────────────────
    const $ = (sel) => document.querySelector(sel);
    const chatMessages = $('#chat-messages');
    const userInput = $('#user-input');
    const btnSend = $('#btn-send');
    const btnStop = $('#btn-stop');
    const statusDot = $('#status-dot');
    const statusText = $('#status-text');
    const thoughtsBody = $('#thoughts-body');
    const toolsBody = $('#tools-body');
    const logsBody = $('#logs-body');
    const mainEl = $('#main');
    const btnPanel = $('#btn-panel');
    const memoryModal = $('#memory-modal');
    const memoryModalBody = $('#memory-modal-body');

    // ─── WebSocket Connection ───────────────────────────
    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}/ws`;

      try {
        ws = new WebSocket(wsUrl);
      } catch (err) {
        setStatus(false, 'Connection failed');
        setTimeout(connect, 3000);
        return;
      }

      ws.onopen = () => {
        setStatus(true, 'Connected');
        addSysMsg('Connected to MIA server');
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          handleServerMessage(msg);
        } catch (err) {
          console.error('Failed to parse server message:', err);
        }
      };

      ws.onclose = () => {
        setStatus(false, 'Disconnected');
        if (streaming) endStream();
        addSysMsg('Connection lost — reconnecting...');
        ws = null;
        setTimeout(connect, 2000);
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
      };
    }

    // ─── Server Message Handler ─────────────────────────
    function handleServerMessage(msg) {
      switch (msg.type) {
        case 'connected':
          sessionId = msg.sessionId;
          console.log('Session:', sessionId);
          break;

        case 'stream_start':
          startStream();
          break;

        case 'stream_chunk':
          appendStreamChunk(msg.delta || '');
          break;

        case 'stream_end':
          endStream();
          break;

        case 'thought':
          addThought(msg.agent || 'Agent', msg.title || '', msg.detail || '', msg.ts || 0);
          break;

        case 'tool':
          addTool(msg.name || 'tool', msg.status || 'running', msg.args || '', msg.result || '', msg.ts || 0);
          break;

        case 'log':
          addLog(msg.text || '', msg.ts || 0);
          break;

        case 'memory_data':
          renderMemoryData(msg.entries || [], msg.total || 0);
          break;

        case 'done':
          finishGeneration();
          break;

        case 'error':
          addSysMsg('⚠ ' + msg.message);
          if (streaming) endStream();
          finishGeneration();
          break;

        default:
          console.log('Unknown message type:', msg.type);
      }
    }

    // ─── Chat Display ───────────────────────────────────
    function addUserBubble(text) {
      const row = document.createElement('div');
      row.className = 'msg-row user';
      row.innerHTML = `
        <div class="msg-label">You</div>
        <div class="msg-bubble">${escapeHtml(text)}</div>
      `;
      chatMessages.appendChild(row);
      scrollToBottom();
    }

    function startStream() {
      streaming = true;
      btnSend.disabled = true;
      btnStop.disabled = false;

      // Create a new MIA bubble for streaming
      streamRow = document.createElement('div');
      streamRow.className = 'msg-row mia';
      streamRow.innerHTML = `
        <div class="msg-label">MIA</div>
        <div class="msg-bubble streaming-cursor"></div>
      `;
      streamBubble = streamRow.querySelector('.msg-bubble');
      chatMessages.appendChild(streamRow);
      scrollToBottom();
    }

    function appendStreamChunk(delta) {
      if (!streamBubble) return;
      // Remove the streaming cursor class while appending
      streamBubble.classList.remove('streaming-cursor');
      streamBubble.innerHTML += formatText(delta);
      // Add cursor back
      streamBubble.classList.add('streaming-cursor');
      scrollToBottom();
    }

    function endStream() {
      if (!streamBubble) return;
      streaming = false;
      streamBubble.classList.remove('streaming-cursor');
      streamBubble = null;
      streamRow = null;
    }

    function finishGeneration() {
      streaming = false;
      btnSend.disabled = false;
      btnStop.disabled = true;
      streamBubble = null;
      streamRow = null;
    }

    function addSysMsg(text) {
      const el = document.createElement('div');
      el.className = 'sys-msg';
      el.textContent = text;
      chatMessages.appendChild(el);
      scrollToBottom();
    }

    // ─── Thoughts ───────────────────────────────────────
    function addThought(agent, title, detail, ts) {
      // Remove empty hint
      const hint = thoughtsBody.querySelector('.empty-hint');
      if (hint) hint.remove();

      const hasDetail = detail && detail.trim().length > 0;
      const card = document.createElement('div');
      card.className = 'thought-card' + (hasDetail ? '' : ' no-detail');
      card.title = hasDetail ? 'Click to expand' : '';
      card.innerHTML = `
        <div class="thought-header">
          <span class="thought-agent">${escapeHtml(agent)}</span>
          <span class="thought-title">${escapeHtml(title)}</span>
          <span class="thought-ts">${formatTime(ts)}</span>
          <span class="thought-expand">▶</span>
        </div>
        ${hasDetail ? `<div class="thought-detail">${escapeHtml(detail)}</div>` : ''}
      `;
      if (hasDetail) {
        card.addEventListener('click', () => {
          card.classList.toggle('expanded');
        });
      }
      thoughtsBody.appendChild(card);
      thoughtsBody.scrollTop = thoughtsBody.scrollHeight;

      // Limit to 20 thought cards
      while (thoughtsBody.children.length > 20) {
        thoughtsBody.firstChild.remove();
      }
    }

    // ─── Tools ──────────────────────────────────────────
    function addTool(name, status, args, result, ts) {
      // Remove empty hint
      const hint = toolsBody.querySelector('.empty-hint');
      if (hint) hint.remove();

      // If there's already a running card for this tool, update it
      if (status === 'success' || status === 'error') {
        const existingCards = toolsBody.querySelectorAll('.tool-card.tool-running');
        for (const card of existingCards) {
          const nameEl = card.querySelector('.tool-name-text');
          if (nameEl && nameEl.textContent === name) {
            // Update card status
            card.className = `tool-card tool-${status}`;
            const statusEl = card.querySelector('.tool-status');
            if (statusEl) statusEl.textContent = status;
            // Append result if new
            if (result) {
              const body = card.querySelector('.tool-body');
              if (!body) {
                const b = document.createElement('div');
                b.className = 'tool-body';
                b.innerHTML = `<div class="tool-result">${escapeHtml(result)}</div>`;
                card.appendChild(b);
                card.classList.add('expanded'); // auto-expand when result arrives
                card.classList.remove('no-body');
                const btn = card.querySelector('.tool-expand');
                if (btn) btn.classList.remove('hidden');
              } else {
                const existingResult = body.querySelector('.tool-result');
                if (!existingResult) {
                  const r = document.createElement('div');
                  r.className = 'tool-result';
                  r.textContent = result;
                  body.appendChild(r);
                } else {
                  existingResult.textContent = result;
                }
              }
            }
            return;
          }
        }
      }

      const hasBody = args || result;
      const card = document.createElement('div');
      card.className = `tool-card tool-${status}${hasBody ? '' : ' no-body'}`;
      card.title = hasBody ? 'Click to expand' : '';
      card.innerHTML = `
        <div class="tool-name">
          <span class="tool-name-text">${escapeHtml(name)}</span>
          <span class="tool-ts">${formatTime(ts)}</span>
          <span class="tool-status">${status}</span>
          <span class="tool-expand${hasBody ? '' : ' hidden'}">▶</span>
        </div>
        ${args ? `<div class="tool-body"><div class="tool-args">${escapeHtml(args)}</div></div>` : ''}
        ${result ? `<div class="tool-body"><div class="tool-result">${escapeHtml(result)}</div></div>` : ''}
      `;
      if (hasBody) {
        card.addEventListener('click', () => {
          card.classList.toggle('expanded');
        });
      }
      toolsBody.appendChild(card);
      toolsBody.scrollTop = toolsBody.scrollHeight;

      // Limit to 15 tool cards
      while (toolsBody.children.length > 15) {
        toolsBody.firstChild.remove();
      }
    }

    /** 展开/收起单个 tool card — 保留兼容（已被 click on card 替代） */
    function toggleToolCard(btn) {
      const card = btn.closest('.tool-card');
      if (!card) return;
      card.classList.toggle('expanded');
    }

    /** 显示/隐藏右侧面板 */
    function toggleSidePanel() {
      mainEl.classList.toggle('side-hidden');
      btnPanel.classList.toggle('active');
    }

    /** 打开记忆查询弹窗 */
    function openMemoryModal() {
      memoryModal.classList.add('open');
      memoryModalBody.innerHTML = '<div class="modal-loading">查询中...</div>';
      // 发送查询请求到服务器
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'memory_query' }));
      } else {
        memoryModalBody.innerHTML = '<div class="modal-loading" style="color:var(--accent-red)">未连接到服务器</div>';
      }
    }

    /** 关闭记忆弹窗 */
    function closeMemoryModal() {
      memoryModal.classList.remove('open');
    }

    /** 渲染记忆数据 */
    function renderMemoryData(entries, total) {
      if (!entries || entries.length === 0) {
        memoryModalBody.innerHTML = '<div class="modal-loading">暂无记忆数据 — 和 MIA 多聊几句就会积累记忆 ✨</div>';
        return;
      }
      let html = `<div class="modal-stats">共 ${total} 条记忆</div>`;
      for (const e of entries) {
        html += `
          <div class="modal-memory-item">
            <div class="mem-content">${escapeHtml(e.content)}</div>
            <div class="mem-meta">
              <span class="mem-category">${escapeHtml(e.category_label || e.category)}</span>
              <span class="mem-confidence">置信度: ${(e.confidence * 100).toFixed(0)}%</span>
              ${e.keywords && e.keywords.length ? `<span class="mem-keywords">${escapeHtml(e.keywords.slice(0, 5).join(', '))}</span>` : ''}
              <span>重要度: ${(e.importance * 100).toFixed(0)}%</span>
            </div>
          </div>`;
      }
      memoryModalBody.innerHTML = html;
    }

    /** 根据内容长度自动显示/隐藏展开按钮 */
    function refreshExpandBtn(card) {
      const btn = card.querySelector('.tool-expand');
      if (!btn) return;
      const hasContent = card.querySelector('.tool-args, .tool-result');
      btn.classList.toggle('hidden', !hasContent);
    }

    // ─── Logs ─────────────────────────────────────────
    function addLog(text, ts) {
      // Remove empty hint
      const hint = logsBody.querySelector('.empty-hint');
      if (hint) hint.remove();

      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `
        <span class="log-ts">${formatTime(ts)}</span>
        <span class="log-text">${escapeHtml(text)}</span>
      `;
      logsBody.appendChild(entry);
      logsBody.scrollTop = logsBody.scrollHeight;

      // Limit to 500 log entries
      while (logsBody.children.length > 500) {
        logsBody.firstChild.remove();
      }
    }

    // ─── Logs ─────────────────────────────────────────
    function addLog(text, ts) {
      // Remove empty hint
      const hint = logsBody.querySelector('.empty-hint');
      if (hint) hint.remove();

      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `
        <span class="log-ts">${formatTime(ts)}</span>
        <span class="log-text">${escapeHtml(text)}</span>
      `;
      logsBody.appendChild(entry);
      logsBody.scrollTop = logsBody.scrollHeight;

      // Limit to 500 log entries
      while (logsBody.children.length > 500) {
        logsBody.firstChild.remove();
      }
    }

    // ─── Helpers ─────────────────────────────────────
    function formatTime(ts) {
      if (!ts) return '--:--:--';
      const d = new Date(ts);
      return d.toLocaleTimeString('zh-CN', { hour12: false });
    }

    // ─── User Actions ───────────────────────────────────
    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        addSysMsg('⚠ Not connected — reconnecting...');
        connect();
        return;
      }

      // Display user message
      addUserBubble(text);

      // Send to server
      ws.send(JSON.stringify({ type: 'chat', query: text }));

      // Clear input
      userInput.value = '';
      userInput.style.height = 'auto';
    }

    function stopGeneration() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop' }));
      }
      if (streaming) {
        endStream();
        finishGeneration();
      }
    }

    // ─── UI Helpers ─────────────────────────────────────
    function setStatus(connected, text) {
      statusDot.className = 'dot' + (connected ? ' connected' : '');
      statusText.textContent = text;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /** Basic markdown-like formatting: code blocks, inline code */
    function formatText(text) {
      if (!text) return '';
      let escaped = escapeHtml(text);
      // Inline code: `text`
      escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
      return escaped;
    }

    function toggleSection(header) {
      // 切换父容器 .side-section 上的 collapsed class
      // CSS 规则会自动隐藏 .section-body 并旋转箭头
      const section = header.closest('.side-section');
      if (section) {
        section.classList.toggle('collapsed');
      }
    }

    // ─── Keyboard Shortcuts ─────────────────────────────
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    // Escape 关闭弹窗
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeMemoryModal();
    });
    // 点击遮罩关闭弹窗
    memoryModal.addEventListener('click', (e) => {
      if (e.target === memoryModal) closeMemoryModal();
    });

    // ─── Startup ─────────────────────────────────────────
    connect();
  </script>
</body>
</html>
